# CI workflow for browser plugin
# Runs on PRs and merges to main
#
# Required secrets for full testing:
#   ANTHROPIC_API_KEY - For Claude Vision tests

name: Browser Plugin CI

on:
  push:
    branches: [main]
    paths:
      - 'internal/plugins/browser/**'
      - 'internal/analyzers/vision/**'
      - 'internal/analyzers/perplexity/**'
      - '.github/workflows/browser-plugin-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'internal/plugins/browser/**'
      - 'internal/analyzers/vision/**'
      - 'internal/analyzers/perplexity/**'
      - '.github/workflows/browser-plugin-ci.yml'

permissions:
  contents: read

jobs:
  # Unit tests - no external dependencies
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.13'
          cache: true

      - name: Run unit tests
        run: |
          CGO_ENABLED=0 go test -v -short ./internal/plugins/browser/...
          CGO_ENABLED=0 go test -v -short ./internal/analyzers/vision/...
          CGO_ENABLED=0 go test -v -short ./internal/analyzers/perplexity/...

  # Integration tests with mock devices (needs Chrome)
  # Note: chromedp browser tests are flaky in CI, so this job is non-blocking
  integration-tests:
    name: Integration Tests (Mock Devices)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      # Mock device containers
      mock-router:
        image: golang:1.24-alpine
        ports:
          - 8081:8080
      mock-camera:
        image: golang:1.24-alpine
        ports:
          - 8082:8080
      mock-printer:
        image: golang:1.24-alpine
        ports:
          - 8083:8080
      mock-nas:
        image: golang:1.24-alpine
        ports:
          - 8084:8080
      mock-generic:
        image: golang:1.24-alpine
        ports:
          - 8085:8080

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.13'
          cache: true

      - name: Install Chrome
        uses: browser-actions/setup-chrome@b94431e051d1c52dcbe9a7092a4f10f827795416 # v2.1.0
        with:
          chrome-version: stable

      - name: Build and start mock services
        run: |
          cd internal/plugins/browser/testdata/mocks

          # Build all mocks
          for device in router camera printer nas generic; do
            CGO_ENABLED=0 go build -o mock-$device ./$device/
          done

          # Start them on different ports
          PORT=8081 ./mock-router &
          PORT=8082 ./mock-camera &
          PORT=8083 ./mock-printer &
          PORT=8084 ./mock-nas &
          PORT=8085 ./mock-generic &

          # Wait for services to be ready
          sleep 3

          # Verify they're running
          for port in 8081 8082 8083 8084 8085; do
            curl -sf http://localhost:$port/health || exit 1
          done
          echo "All mock services ready"

      - name: Run integration tests
        run: |
          CGO_ENABLED=0 go test -v -tags=chromedp ./internal/plugins/browser/... -timeout 2m

      - name: Run E2E tests
        run: |
          CGO_ENABLED=0 go test -v -tags=e2e ./internal/plugins/browser/... -timeout 5m

  # Vision API tests (requires ANTHROPIC_API_KEY)
  vision-api-tests:
    name: Vision API Tests
    runs-on: ubuntu-latest
    environment: internal
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.13'
          cache: true

      - name: Install Chrome
        uses: browser-actions/setup-chrome@b94431e051d1c52dcbe9a7092a4f10f827795416 # v2.1.0
        with:
          chrome-version: stable

      - name: Check for API key
        id: check-key
        run: |
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::ANTHROPIC_API_KEY not set - skipping vision API tests"
          fi

      - name: Run Vision API tests
        if: steps.check-key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CGO_ENABLED=0 go test -v -tags=vision_api ./internal/analyzers/vision/... -timeout 2m

  # Full pipeline test (requires API keys + Chrome)
  full-pipeline-test:
    name: Full Pipeline Test
    runs-on: ubuntu-latest
    environment: internal
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.13'
          cache: true

      - name: Install Chrome
        uses: browser-actions/setup-chrome@b94431e051d1c52dcbe9a7092a4f10f827795416 # v2.1.0
        with:
          chrome-version: stable

      - name: Build mock services
        run: |
          cd internal/plugins/browser/testdata/mocks
          for device in router camera printer nas generic; do
            CGO_ENABLED=0 go build -o mock-$device ./$device/
          done

          PORT=8081 ./mock-router &
          PORT=8082 ./mock-camera &
          PORT=8083 ./mock-printer &
          PORT=8084 ./mock-nas &
          PORT=8085 ./mock-generic &
          sleep 3

      - name: Run full pipeline test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          # Build brutus
          CGO_ENABLED=0 go build -o brutus ./cmd/brutus/

          # Test against mock router with browser plugin
          ./brutus -target localhost:8081 -protocol browser -u admin -p admin --json || true
          ./brutus -target localhost:8081 -protocol browser -u admin -p wrongpass --json || true

          echo "Full pipeline test complete"

  # Build verification
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.13'
          cache: true

      - name: Build
        run: CGO_ENABLED=0 go build -v ./...

      - name: Build with all tags
        run: |
          CGO_ENABLED=0 go build -tags=integration -v ./...
          CGO_ENABLED=0 go build -tags=e2e -v ./...
